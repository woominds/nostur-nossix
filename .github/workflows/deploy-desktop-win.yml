name: Deploy NOSTUR NOSSIX Desktop Windows

on:
  workflow_dispatch:

jobs:
  deploy:
    name: Build and deploy Windows release
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Read package version
        id: package
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Package version: $VERSION"

      - name: Build Windows release
        run: npm run dist:win
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Check required secrets
        shell: bash
        run: |
          test -n "${{ secrets.HOSTING_HOST }}" && echo "HOSTING_HOST OK" || (echo "HOSTING_HOST missing" && exit 1)
          test -n "${{ secrets.HOSTING_USER }}" && echo "HOSTING_USER OK" || (echo "HOSTING_USER missing" && exit 1)
          test -n "${{ secrets.HOSTING_SSH_KEY }}" && echo "HOSTING_SSH_KEY OK" || (echo "HOSTING_SSH_KEY missing" && exit 1)

      - name: Setup SSH
        shell: bash
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.HOSTING_SSH_KEY }}" > ~/.ssh/nostur_fastcomet_deploy
          chmod 600 ~/.ssh/nostur_fastcomet_deploy
          ssh-keyscan "${{ secrets.HOSTING_HOST }}" >> ~/.ssh/known_hosts

      - name: List release files
        shell: bash
        run: ls -la release

      - name: Deploy Windows update files to FastComet
        shell: bash
        run: |
          VERSION="${{ steps.package.outputs.version }}"

          scp -i ~/.ssh/nostur_fastcomet_deploy \
            release/latest.yml \
            release/NOSTUR-NOSSIX-Setup-${VERSION}.exe \
            release/NOSTUR-NOSSIX-Setup-${VERSION}.exe.blockmap \
            ${{ secrets.HOSTING_USER }}@${{ secrets.HOSTING_HOST }}:/home/jbaticac/nossix.nostur.com.ar/desktop/win/

      - name: Deploy Windows manual download
        shell: bash
        run: |
          VERSION="${{ steps.package.outputs.version }}"

          scp -i ~/.ssh/nostur_fastcomet_deploy \
            release/NOSTUR-NOSSIX-Setup-${VERSION}.exe \
            ${{ secrets.HOSTING_USER }}@${{ secrets.HOSTING_HOST }}:/home/jbaticac/nossix.nostur.com.ar/downloads/win/

      - name: Done
        shell: bash
        run: |
          echo "Windows release deployed:"
          echo "https://nossix.nostur.com.ar/desktop/win/latest.yml"
          echo "https://nossix.nostur.com.ar/downloads/win/NOSTUR-NOSSIX-Setup-${{ steps.package.outputs.version }}.exe"