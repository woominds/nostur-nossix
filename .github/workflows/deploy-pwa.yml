      - name: Setup SSH
        run: |
          if [ -z "${{ secrets.HOSTING_HOST }}" ]; then
            echo "Missing secret HOSTING_HOST"
            exit 1
          fi

          if [ -z "${{ secrets.HOSTING_USER }}" ]; then
            echo "Missing secret HOSTING_USER"
            exit 1
          fi

          if [ -z "${{ secrets.HOSTING_SSH_KEY }}" ]; then
            echo "Missing secret HOSTING_SSH_KEY"
            exit 1
          fi

          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.HOSTING_SSH_KEY }}" > ~/.ssh/nostur_fastcomet_deploy
          chmod 600 ~/.ssh/nostur_fastcomet_deploy
          ssh-keyscan "${{ secrets.HOSTING_HOST }}" >> ~/.ssh/known_hosts